services:
  mysql:
    image: mysql:8.0
    container_name: lichvannien-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: lunar_calendar_mvp
      MYSQL_USER: lunar_user
      MYSQL_PASSWORD: lunar_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lichvannien-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 3000
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: lunar_user
      DB_PASSWORD: lunar_password
      DB_NAME: lunar_calendar_mvp
      JWT_SECRET: change-this-to-a-long-random-secret
      JWT_EXPIRES_IN: 7d
    ports:
      - "3000:3000"

  phpmyadmin:
    image: phpmyadmin:5
    container_name: lichvannien-phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    ports:
      - "8080:80"

volumes:
  mysql_data:
